global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector — scrapes metrics from all instrumented services
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: 'otel-collector'

  # Matching Service — custom Go metrics endpoint (if exposed directly)
  - job_name: 'matching-service'
    static_configs:
      - targets: ['matching-service:9464']
        labels:
          service: 'matching-service'
