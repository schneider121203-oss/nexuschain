version: '3.8'

services:
  # ─────────────────────────────────────────────
  # INFRASTRUCTURE — Databases & Message Bus
  # ─────────────────────────────────────────────

  # Database for strict balance storage (ACID)
  postgres:
    image: postgres:15-alpine
    container_name: nexus_postgres
    environment:
      POSTGRES_DB: nexuschain_db
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexuschain_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Message bus coordinator
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: nexus_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Xmx128M -Xms128M"
    ports:
      - "2181:2181"

  # Event bus (Kafka)
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: nexus_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_OPTS: "-Xmx256M -Xms256M"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates Kafka topics at startup (primary + DLQ + Saga topics)
  # Implements Gap 3.5 (DLQ) and Gap 3.2 (Saga) from plan_tecnico_nexuschain.md
  kafka-setup:
    image: confluentinc/cp-kafka:7.3.0
    container_name: nexus_kafka_setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo 'Creating Kafka topics...'
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transactions-topic --partitions 6 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transactions-topic.dlq --partitions 3 --replication-factor 1 --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic saga.commands --partitions 3 --replication-factor 1 --config retention.ms=86400000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic saga.events --partitions 3 --replication-factor 1 --config retention.ms=86400000
        echo 'Kafka topics created: transactions-topic + dlq + saga.commands + saga.events'
    restart: "no"

  # NoSQL Database for immutable audit trail and historical logs
  cassandra:
    image: cassandra:4.1
    container_name: nexus_cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # OBSERVABILITY STACK — OTel + Jaeger + Prometheus + Grafana
  # Implements §4.3 of plan_tecnico_nexuschain.md
  # ─────────────────────────────────────────────

  # OpenTelemetry Collector — receives traces/metrics from all services,
  # forwards traces to Jaeger and metrics to Prometheus
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: nexus_otel_collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver (services push here)
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics exporter (Prometheus scrapes this)
    depends_on:
      - jaeger

  # Jaeger — distributed tracing UI
  # Access: http://localhost:16686
  # Demo tip: submit a transaction, then search for 'api-gateway' service in Jaeger
  # to see the full trace: Gateway → Balance gRPC → response
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: nexus_jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC endpoint (OTel Collector sends traces here)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Prometheus — time-series metrics database
  # Access: http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: nexus_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  # Grafana — metrics dashboards
  # Access: http://localhost:3001 (admin / admin)
  # Demo tip: import community dashboard ID 17175 (OTel Collector) or 1860 (Node Exporter)
  # to see nexuschain.matching_orders_total and nexuschain.balance_debit_latency_seconds
  grafana:
    image: grafana/grafana:10.4.4
    container_name: nexus_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ─────────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────────

  balance-service:
    build:
      context: ./balance-service
      dockerfile: Dockerfile
    container_name: nexus_balance_service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      - spring.datasource.url=jdbc:postgresql://postgres:5432/nexuschain_db
      - spring.datasource.username=nexus_user
      - spring.datasource.password=nexus_password

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: nexus_api_gateway
    depends_on:
      - balance-service
      - saga-orchestrator
      - consensus-service
      - transaction-history
      - otel-collector
    ports:
      - "8089:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=nexuschain_super_secret_key_change_in_production
      - BALANCE_SERVICE_URL=balance-service:50051
      - MATCHING_SERVICE_URL=matching-service:8082
      - SAGA_ORCHESTRATOR_URL=saga-orchestrator:8083
      - CONSENSUS_SERVICE_URL=consensus-service:8084
      - TRANSACTION_HISTORY_URL=transaction-history:8085
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - NODE_ENV=production

  matching-service:
    build:
      context: ./matching-service
      dockerfile: Dockerfile
    container_name: nexus_matching_service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BROKER=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=matching-service

  transaction-history:
    build:
      context: ./transaction-history
      dockerfile: Dockerfile
    container_name: nexus_transaction_history
    depends_on:
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
      cassandra:
        condition: service_healthy
    environment:
      - KAFKA_BROKERS=kafka:9092
      - CASSANDRA_CONTACT_POINTS=cassandra
      - CASSANDRA_LOCAL_DATA_CENTER=datacenter1
      - CASSANDRA_KEYSPACE=nexuschain

  consensus-service:
    build:
      context: ./consensus-service
      dockerfile: Dockerfile
    container_name: nexus_consensus_service
    ports:
      - "8084:8084"

  # 🎭 Saga Orchestrator — Distributed Transaction Coordinator
  # Implements the explicit Saga pattern (Gap 3.2) from plan_tecnico_nexuschain.md
  # State machine: PENDING → BALANCE_LOCKED → MATCHED → SETTLED (or COMPENSATING → ROLLED_BACK)
  # Access the admin API at http://localhost:8083
  saga-orchestrator:
    build:
      context: ./saga-orchestrator
      dockerfile: Dockerfile
    container_name: nexus_saga_orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
      balance-service:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=nexuschain_db
      - DB_USER=nexus_user
      - DB_PASSWORD=nexus_password
      - KAFKA_BROKERS=kafka:9092
      - BALANCE_SERVICE_URL=balance-service:50051
      - SAGA_TIMEOUT_MINUTES=5
      - SAGA_WATCHDOG_INTERVAL_MS=60000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  cassandra_data:
  prometheus_data:
  grafana_data:
