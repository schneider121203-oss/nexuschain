# Spring Application Config
spring.application.name=balance-service
server.port=8081

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/nexuschain_db
spring.datasource.username=nexus_user
spring.datasource.password=nexus_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Config
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# gRPC Configuration (Custom implementation port)
grpc.server.port=50051
